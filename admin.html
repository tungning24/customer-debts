<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>จัดการฐานข้อมูล</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --line: #d9e0ea;
      --text: #172033;
      --muted: #66758a;
      --primary: #1261a6;
      --primary-dark: #0b477d;
      --danger: #b42318;
      --danger-bg: #fff1f0;
      --focus: rgba(18, 97, 166, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 3;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .top-actions,
    .tabs,
    .row-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    main {
      padding: 16px 20px 28px;
    }

    label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-weight: 600;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 8px 9px;
      outline: 0;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--focus);
    }

    input[readonly] {
      color: var(--muted);
      background: #f3f6fa;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: var(--primary);
    }

    button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      border-color: #9fb0c6;
    }

    button.primary,
    .tab.active {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    button.primary:hover,
    .tab.active:hover {
      background: var(--primary-dark);
    }

    button.danger {
      border-color: #f1b4ae;
      background: var(--danger-bg);
      color: var(--danger);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .admin-key {
      width: min(340px, 42vw);
    }

    .tabs {
      margin-bottom: 12px;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
    }

    .table-wrap {
      width: 100%;
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      min-width: 1040px;
      border-collapse: collapse;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 7px;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      background: #edf2f8;
      color: #35445a;
      font-size: 12px;
      text-transform: uppercase;
    }

    tr.dirty td {
      background: #fffaf0;
    }

    td:last-child,
    th:last-child {
      border-right: 0;
    }

    td input,
    td select {
      min-width: 120px;
    }

    td .id-field {
      min-width: 250px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
    }

    td .note-field {
      min-width: 220px;
    }

    .message {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(520px, calc(100vw - 36px));
      padding: 12px 14px;
      border-radius: 8px;
      background: #172033;
      color: #fff;
      box-shadow: 0 12px 28px rgba(23, 32, 51, 0.24);
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: 0.18s ease;
    }

    .message.show {
      transform: translateY(0);
      opacity: 1;
    }

    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 760px) {
      header {
        align-items: stretch;
        flex-direction: column;
      }

      .top-actions,
      .admin-key {
        width: 100%;
      }

      main {
        padding: 12px;
      }

    }
  </style>
</head>
<body>
  <header>
    <h1>จัดการฐานข้อมูล</h1>
    <div class="top-actions">
      <label>
        Admin key
        <input class="admin-key" id="adminKey" type="password" autocomplete="current-password">
      </label>
      <button id="loadBtn" class="primary" type="button">โหลดข้อมูล</button>
      <a href="./index.html"><button type="button">กลับหน้าใช้งาน</button></a>
    </div>
  </header>

  <main>
    <div class="tabs" id="tabs"></div>
    <div class="meta">
      <span id="tableLabel">-</span>
      <span id="rowCount">0 แถว</span>
    </div>
    <div class="table-wrap" id="tableWrap">
      <div class="empty">กรอก admin key แล้วกดโหลดข้อมูล</div>
    </div>
  </main>

  <div class="message" id="message"></div>

  <script>
    const API_URL = "/api/debts";
    const STORE_KEY = "customer-debts-settings";
    const TABLES = [
      { name: "customers", label: "customers" },
      { name: "debt_entries", label: "debt_entries" },
      { name: "payments", label: "payments" }
    ];

    const state = {
      table: "customers",
      columns: [],
      rows: [],
      busy: false
    };

    const els = {
      adminKey: document.getElementById("adminKey"),
      loadBtn: document.getElementById("loadBtn"),
      tabs: document.getElementById("tabs"),
      tableLabel: document.getElementById("tableLabel"),
      rowCount: document.getElementById("rowCount"),
      tableWrap: document.getElementById("tableWrap"),
      message: document.getElementById("message")
    };

    function showMessage(text) {
      els.message.textContent = text;
      els.message.classList.add("show");
      window.clearTimeout(showMessage.timer);
      showMessage.timer = window.setTimeout(() => els.message.classList.remove("show"), 2600);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function loadSettings() {
      try {
        const settings = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
        els.adminKey.value = settings.adminKey || "";
      } catch {
        localStorage.removeItem(STORE_KEY);
      }
    }

    function saveSettings() {
      localStorage.setItem(STORE_KEY, JSON.stringify({ adminKey: els.adminKey.value }));
    }

    async function api(action, payload = {}) {
      const adminKey = els.adminKey.value.trim();
      if (!adminKey) throw new Error("กรอก admin key ก่อน");

      state.busy = true;
      saveSettings();
      setBusy(true);
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action, adminKey, ...payload })
        });
        const text = await response.text();
        let result;
        try {
          result = JSON.parse(text);
        } catch {
          throw new Error("API ไม่ได้ตอบกลับ JSON");
        }
        if (!result.ok) throw new Error(result.error || "API error");
        return result;
      } finally {
        state.busy = false;
        setBusy(false);
      }
    }

    function setBusy(value) {
      els.loadBtn.disabled = value;
      document.querySelectorAll("button").forEach(button => {
        if (button.id !== "loadBtn") button.disabled = value;
      });
    }

    function renderTabs() {
      els.tabs.innerHTML = TABLES.map(table => `
        <button class="tab ${table.name === state.table ? "active" : ""}" type="button" data-table="${table.name}">
          ${escapeHtml(table.label)}
        </button>
      `).join("");
    }

    function renderTable() {
      renderTabs();
      els.tableLabel.textContent = state.table;
      els.rowCount.textContent = `${state.rows.length} แถว`;

      if (!state.columns.length) {
        els.tableWrap.innerHTML = `<div class="empty">ไม่มีข้อมูล</div>`;
        return;
      }

      const head = `
        <thead>
          <tr>
            ${state.columns.map(column => `<th>${escapeHtml(column.name)}</th>`).join("")}
            <th>actions</th>
          </tr>
        </thead>
      `;
      const body = state.rows.map(row => `
        <tr data-id="${escapeHtml(row.id)}">
          ${state.columns.map(column => `
            <td>${renderField(row, column)}</td>
          `).join("")}
          <td>
            <div class="row-actions">
              <button class="primary" type="button" data-save="${escapeHtml(row.id)}">บันทึก</button>
              <button class="danger" type="button" data-delete="${escapeHtml(row.id)}">ลบแถว</button>
            </div>
          </td>
        </tr>
      `).join("");

      els.tableWrap.innerHTML = `<table>${head}<tbody>${body}</tbody></table>`;
    }

    function renderField(row, column) {
      const value = row[column.name] ?? "";
      const safeName = escapeHtml(column.name);
      const safeValue = escapeHtml(formatFieldValue(value, column.type));

      if (column.type === "readonly") {
        const className = column.name === "id" || column.name.endsWith("_id") ? "id-field" : "";
        return `<input class="${className}" data-column="${safeName}" value="${safeValue}" readonly>`;
      }

      if (column.type === "boolean") {
        return `<input type="checkbox" data-column="${safeName}" ${value ? "checked" : ""}>`;
      }

      if (column.type === "debt_status") {
        return `
          <select data-column="${safeName}">
            <option value="open" ${value === "open" ? "selected" : ""}>open</option>
            <option value="paid" ${value === "paid" ? "selected" : ""}>paid</option>
          </select>
        `;
      }

      if (column.type === "payment_status") {
        return `
          <select data-column="${safeName}">
            <option value="open" ${value === "open" ? "selected" : ""}>open</option>
            <option value="close" ${value === "close" ? "selected" : ""}>close</option>
          </select>
        `;
      }

      if (column.type === "date" || column.type === "nullable_date") {
        return `<input type="date" data-column="${safeName}" value="${safeValue}">`;
      }

      if (column.type === "number" || column.type === "integer") {
        return `<input type="number" step="${column.type === "integer" ? "1" : "0.01"}" data-column="${safeName}" value="${safeValue}">`;
      }

      const className = column.name === "note" ? "note-field" : (column.name.endsWith("_id") ? "id-field" : "");
      return `<input class="${className}" data-column="${safeName}" value="${safeValue}">`;
    }

    function formatFieldValue(value, type) {
      if (value === null || value === undefined) return "";
      if (type === "date" || type === "nullable_date") return String(value).slice(0, 10);
      return value;
    }

    function readRowValues(rowElement) {
      const values = {};
      state.columns.forEach(column => {
        if (column.type === "readonly") return;
        const input = rowElement.querySelector(`[data-column="${CSS.escape(column.name)}"]`);
        if (!input) return;
        values[column.name] = input.type === "checkbox" ? input.checked : input.value;
      });
      return values;
    }

    async function loadTable() {
      try {
        const result = await api("adminList", { table: state.table });
        state.columns = result.columns || [];
        state.rows = result.rows || [];
        renderTable();
        showMessage(`โหลด ${state.table} แล้ว`);
      } catch (error) {
        console.error(error);
        showMessage(error.message);
      }
    }

    async function saveRow(id) {
      const rowElement = document.querySelector(`tr[data-id="${CSS.escape(id)}"]`);
      if (!rowElement) return;

      try {
        await api("adminUpdate", {
          table: state.table,
          id,
          values: readRowValues(rowElement)
        });
        rowElement.classList.remove("dirty");
        showMessage("บันทึกแถวแล้ว");
        await loadTable();
      } catch (error) {
        console.error(error);
        showMessage(error.message);
      }
    }

    async function deleteRow(id) {
      if (!confirm(`ลบแถวนี้ออกจาก ${state.table} ใช่ไหม?\n${id}`)) return;

      try {
        await api("adminDelete", { table: state.table, id });
        showMessage("ลบแถวแล้ว");
        await loadTable();
      } catch (error) {
        console.error(error);
        showMessage(error.message);
      }
    }

    els.tabs.addEventListener("click", event => {
      const button = event.target.closest("[data-table]");
      if (!button) return;
      state.table = button.dataset.table;
      loadTable();
    });

    els.tableWrap.addEventListener("input", event => {
      const row = event.target.closest("tr[data-id]");
      if (row) row.classList.add("dirty");
    });

    els.tableWrap.addEventListener("change", event => {
      const row = event.target.closest("tr[data-id]");
      if (row) row.classList.add("dirty");
    });

    document.addEventListener("click", event => {
      const saveButton = event.target.closest("[data-save]");
      if (saveButton) {
        saveRow(saveButton.dataset.save);
        return;
      }

      const deleteButton = event.target.closest("[data-delete]");
      if (deleteButton) {
        deleteRow(deleteButton.dataset.delete);
      }
    });

    els.loadBtn.addEventListener("click", loadTable);
    els.adminKey.addEventListener("change", saveSettings);

    loadSettings();
    renderTabs();
    if (els.adminKey.value.trim()) loadTable();
  </script>
</body>
</html>
